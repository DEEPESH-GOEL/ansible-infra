---
- name: Diagnose EC2 Connection
  hosts: myec2
  gather_facts: no
  remote_user: ec2-user
  tasks:
    - name: Test 1 - raw without become
      ansible.builtin.raw: echo "test-no-become"

    - name: Test 2 - raw with become
      ansible.builtin.raw: echo "test-with-become"
      become: yes

    - name: Test 3 - shell with become
      ansible.builtin.shell: whoami
      become: yes
