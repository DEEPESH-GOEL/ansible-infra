---
- name: Install required packages
  yum:
    name:
      - nginx
      - python3-pip
      - git
      - unzip
    state: present
    use_backend: yum

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes
  notify: reload nginx

- name: Harden SSH - disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart sshd
